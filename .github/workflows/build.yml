name: Build Ghost Session

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-vst-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE
        run: git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake
        run: |
          cd apps/plugin
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_CXX_FLAGS="-Wno-deprecated-declarations -Wno-error"

      - name: Build (show errors only)
        run: |
          cd apps/plugin
          cmake --build build --config Release -j1 2>&1 | tee /tmp/build.log | grep -E "^.*error:" || true
          echo "--- Last 30 lines ---"
          tail -30 /tmp/build.log
          # Check if binary was produced
          if find build -name "Ghost Session.vst3" -type d | grep -q .; then
            echo "BUILD SUCCESS"
          else
            echo "BUILD FAILED - no VST3 produced"
            grep "error:" /tmp/build.log | head -20
            exit 1
          fi

      - name: Package plugins
        run: |
          mkdir -p artifacts
          find apps/plugin/build -name "Ghost Session.vst3" -type d | head -1 | while read dir; do
            cp -r "$dir" artifacts/
          done
          find apps/plugin/build -name "Ghost Session.component" -type d | head -1 | while read dir; do
            cp -r "$dir" artifacts/
          done
          du -sh artifacts/*

      - name: Upload VST3 Plugin
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Session-VST3-macOS
          path: artifacts/

name: Build Ghost Session

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-vst-mac:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE
        run: git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake
        run: |
          cd apps/plugin
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_CXX_FLAGS="-Wno-deprecated-declarations -Wno-error"

      - name: Build VST3
        run: |
          cd apps/plugin
          cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Find build output
        run: |
          echo "=== All .vst3 bundles ==="
          find . -name "*.vst3" -not -path "*/.git/*" 2>/dev/null
          echo "=== Artefacts ==="
          ls -laR apps/plugin/build/GhostSession_artefacts/ 2>/dev/null || echo "No artefacts dir"

      - name: Create installer script
        run: |
          mkdir -p dmg-content
          cat > dmg-content/Install.command << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          echo ""
          echo "  Installing Ghost Session VST3 plugin..."
          echo ""
          sudo mkdir -p "/Library/Audio/Plug-Ins/VST3"
          sudo cp -r "$DIR/Ghost Session.vst3" "/Library/Audio/Plug-Ins/VST3/"
          echo "  Done! Open your DAW and scan for plugins."
          echo ""
          read -p "  Press Enter to close..."
          EOF
          chmod +x dmg-content/Install.command

      - name: Copy VST3 to DMG content
        run: |
          VST3=$(find . -path "*/Ghost Session.vst3/Contents" -type d 2>/dev/null | head -1 | sed 's|/Contents||')
          if [ -z "$VST3" ]; then
            echo "VST3 not found!"
            exit 1
          fi
          echo "Found: $VST3"
          cp -r "$VST3" dmg-content/
          du -sh dmg-content/*

      - name: Create DMG
        run: |
          hdiutil create -volname "Ghost Session" \
            -srcfolder dmg-content \
            -ov -format UDZO \
            "Ghost-Session-macOS.dmg"
          ls -la Ghost-Session-macOS.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Session-macOS-Installer
          path: Ghost-Session-macOS.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Ghost-Session-macOS.dmg
          name: "Ghost Session ${{ github.ref_name }}"
          body: |
            ## Ghost Session VST3 Plugin for macOS

            **Download `Ghost-Session-macOS.dmg` below.**

            ### Install
            1. Open the DMG
            2. Right-click Install.command → Open
            3. Enter your Mac password
            4. Open your DAW and scan for plugins
            5. Add Ghost Session to any track

            Or drag Ghost Session.vst3 to /Library/Audio/Plug-Ins/VST3/

name: Build Ghost Session

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-vst-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install JUCE
        run: |
          git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake
        run: |
          cd apps/plugin
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build VST3 and AU
        run: |
          cd apps/plugin
          cmake --build build --config Release --target GhostSession_VST3
          cmake --build build --config Release --target GhostSession_AU || true
          cmake --build build --config Release --target GhostSession_Standalone || true

      - name: Package VST3
        run: |
          mkdir -p artifacts
          cp -r apps/plugin/build/GhostSession_artefacts/Release/VST3/*.vst3 artifacts/ || true
          cp -r apps/plugin/build/GhostSession_artefacts/Release/AU/*.component artifacts/ || true
          cp -r apps/plugin/build/GhostSession_artefacts/Release/Standalone/*.app artifacts/ || true
          ls -la artifacts/

      - name: Upload VST3 Plugin
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Session-VST3-macOS
          path: artifacts/
